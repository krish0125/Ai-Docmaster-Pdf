<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat with your PDF documents using AI - Ask questions and get instant answers">
    <title>Chat with PDF | AI DocMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="chat-layout">
        <!-- PDF Info Sidebar -->
        <aside class="chat-sidebar" id="chatSidebar">
            <div class="chat-sidebar-header">
                <a href="dashboard.html" class="btn-back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Dashboard
                </a>
                <button class="btn-icon" id="toggleSidebar" title="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
            </div>

            <div class="pdf-upload-sidebar" id="chatUploadArea">
                <div class="dropzone compact" id="chatPdfDropzone">
                    <input type="file" id="chatPdfInput" accept=".pdf" hidden>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
                    <h4>Upload PDF</h4>
                    <p class="text-muted text-sm">Drop a PDF to start chatting</p>
                </div>
                <div id="chatUploadStatus" style="display:none;" class="upload-status-bar"></div>
            </div>

            <div id="pdfInfoPanel" class="pdf-info-panel">
                <div class="empty-state-sm">
                    <p class="text-muted">No PDF loaded yet</p>
                </div>
            </div>

            <div class="chat-sidebar-footer">
                <button class="btn btn-outline btn-sm btn-full" id="clearChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Clear Chat
                </button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-main" id="chatArea">
            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty-state">
                    <div class="chat-empty-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h3>Chat with Your PDF</h3>
                    <p class="text-muted">Upload a PDF document to start an intelligent conversation about its contents.</p>
                    <div class="example-questions">
                        <p class="text-sm text-muted">Try asking:</p>
                        <button class="example-q" onclick="document.getElementById('chatInput').value='What is this document about?'">What is this document about?</button>
                        <button class="example-q" onclick="document.getElementById('chatInput').value='Summarize the key points'">Summarize the key points</button>
                        <button class="example-q" onclick="document.getElementById('chatInput').value='List the main conclusions'">List the main conclusions</button>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-area">
                <form class="chat-form" id="chatForm">
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" class="chat-input" placeholder="Ask a question about your PDF..." rows="1" 
                            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
                        <button type="submit" class="send-btn" id="sendBtn" title="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                    <p class="chat-disclaimer text-muted text-sm">AI responses are generated and may not always be accurate. Verify important information.</p>
                </form>
            </div>
        </main>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
