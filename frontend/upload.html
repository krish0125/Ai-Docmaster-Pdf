<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Upload your documents for AI-powered processing">
    <title>Upload Files | AI DocMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body style="background: var(--bg-primary);">
    <div class="upload-page">
        <header class="upload-header">
            <a href="dashboard.html" class="btn-back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Dashboard
            </a>
            <h1>Upload Files</h1>
            <p class="text-secondary">Upload PDFs and images for processing</p>
        </header>

        <div class="upload-container">
            <div class="dropzone large" id="uploadDropzone">
                <input type="file" id="uploadFileInput" accept=".pdf,.png,.jpg,.jpeg" multiple hidden>
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <h2>Drag & Drop Files Here</h2>
                <p class="text-muted">or click to browse files</p>
                <div class="accepted-types">
                    <span class="type-badge pdf">PDF</span>
                    <span class="type-badge img">PNG</span>
                    <span class="type-badge img">JPG</span>
                    <span class="type-badge img">JPEG</span>
                </div>
                <p class="text-muted text-sm">Maximum file size: 50MB</p>
            </div>

            <div id="uploadFileList" class="upload-file-list">
                <div class="empty-state"><p>No files selected</p></div>
            </div>

            <button class="btn btn-primary btn-lg" id="uploadAllBtn" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload All
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
